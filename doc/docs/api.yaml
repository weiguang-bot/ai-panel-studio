openapi: "3.0.3"
info:
  title: "AI 圆桌讨论 API"
  description: |
    创建 AI 圆桌讨论、实时接收 SSE 推送发言、查询会话记录、生成共识分歧摘要。
    每个 Session 完全隔离，SSE 连接按 session_id 隔离接收。
  version: "1.0.0"
  contact:
    name: "后端团队"

servers:
  - url: "http://localhost:8080"
    description: "本地开发环境"

# ============================================================================
# 组件
# ============================================================================
components:
  schemas:
    # ------- 基础类型 -------
    SessionStatus:
      type: string
      enum: [pending, generating, discussing, concluded, error]
      description: "讨论状态：pending=待生成, generating=生成专家中, discussing=讨论中, concluded=已结束, error=出错"

    SessionBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-..."
        topic:
          type: string
          example: "人工智能是否会取代人类工作"
        expert_count:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        status:
          $ref: "#/components/schemas/SessionStatus"
        created_at:
          type: string
          format: date-time
          example: "2026-07-03T10:00:00Z"
      required: [id, topic, expert_count, status, created_at]

    Expert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "e001-..."
        session_id:
          type: string
          format: uuid
        name:
          type: string
          example: "张思远"
        title:
          type: string
          example: "AI 伦理研究员 ·清华大学"
        stance:
          type: string
          example: "持审慎乐观态度，认为 AI 会重塑而非取代"
        color:
          type: string
          example: "#6366f1"
        avatar_emoji:
          type: string
          example: "🧑‍🔬"
        sort_order:
          type: integer
          example: 1
      required: [id, session_id, name, title, stance, color, avatar_emoji]

    Transcript:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        speaker_type:
          type: string
          enum: [host, expert]
          description: "host=主持人, expert=专家"
        speaker_id:
          type: string
          nullable: true
          description: "专家 ID；host 发言时为 null"
        speaker_name:
          type: string
          example: "张思远"
        avatar_emoji:
          type: string
          example: "🧑‍🔬"
        content:
          type: string
          example: "我认为 AI 会重塑岗位结构，但不会完全取代人类。"
        sequence:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
      required:
        [id, session_id, speaker_type, speaker_name, content, sequence, created_at]

    Consensus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        summary:
          type: string
          example: "AI 将改变工作方式，人类需持续学习以适应变化"
        sort_order:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
      required: [id, session_id, summary]

    Divergence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        description:
          type: string
          example: "AI 对白领 vs 蓝领的影响程度存在分歧"
        involved_experts:
          type: array
          items:
            type: string
            format: uuid
          example: ["e001-...", "e003-..."]
        side_a_expert:
          type: string
          format: uuid
          nullable: true
          description: "正方专家 ID"
        side_b_expert:
          type: string
          format: uuid
          nullable: true
          description: "反方专家 ID"
        sort_order:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
      required: [id, session_id, description, involved_experts]

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionBrief"
        - type: object
          properties:
            experts:
              type: array
              items:
                $ref: "#/components/schemas/Expert"

    # ------- 请求体 -------
    CreateSessionRequest:
      type: object
      required: [topic]
      properties:
        topic:
          type: string
          minLength: 2
          maxLength: 500
          example: "人工智能是否会取代人类工作"
          description: "讨论话题"
        expert_count:
          type: integer
          minimum: 1
          maximum: 10
          default: 4
          example: 4
          description: "专家人数（含主持人）"

    ConclusionResponse:
      type: object
      properties:
        consensus:
          type: array
          items:
            $ref: "#/components/schemas/Consensus"
        divergences:
          type: array
          items:
            $ref: "#/components/schemas/Divergence"
        session_status:
          $ref: "#/components/schemas/SessionStatus"
      required: [consensus, divergences, session_status]

    # ------- SSE 事件 -------
    SSEEvent:
      type: object
      description: "SSE 事件格式：event: <type>\\ndata: <json>\\n\\n"
      properties:
        event:
          type: string
          enum:
            - session.status        # 状态变更
            - transcript.new        # 新发言
            - expert.generated      # 专家生成完成
            - conclusion.completed  # 结论生成完成
            - heartbeat             # 保活信号
            - session.error        # 错误
          example: "transcript.new"
        data:
          type: object
          description: "事件 payload，类型见各事件描述"

  # ------- SSE 事件映射（用于文档说明） -------
    SSE_StatusEvent:
      type: object
      properties:
        event:
          type: string
          enum: [session.status]
        data:
          type: object
          properties:
            session_id:
              type: string
            status:
              $ref: "#/components/schemas/SessionStatus"
            previous_status:
              $ref: "#/components/schemas/SessionStatus"
      required: [event, data]

    SSE_TranscriptEvent:
      type: object
      properties:
        event:
          type: string
          enum: [transcript.new]
        data:
          $ref: "#/components/schemas/Transcript"
      required: [event, data]

    SSE_ExpertGeneratedEvent:
      type: object
      properties:
        event:
          type: string
          enum: [expert.generated]
        data:
          type: object
          properties:
            session_id:
              type: string
            experts:
              type: array
              items:
                $ref: "#/components/schemas/Expert"
      required: [event, data]

    SSE_ConclusionCompleted:
      type: object
      properties:
        event:
          type: string
          enum: [conclusion.completed]
        data:
          $ref: "#/components/schemas/ConclusionResponse"
      required: [event, data]

    SSE_Heartbeat:
      type: object
      properties:
        event:
          type: string
          enum: [heartbeat]
        data:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
      required: [event, data]

    SSE_ErrorEvent:
      type: object
      properties:
        event:
          type: string
          enum: [session.error]
        data:
          type: object
          properties:
            session_id:
              type: string
            message:
              type: string
      required: [event, data]

    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "SESSION_NOT_FOUND"
            message:
              type: string
              example: "讨论会话不存在"
      required: [error]

# ============================================================================
# 路径
# ============================================================================
paths:
  # ----------------------------------------------------------
  # POST /api/sessions —创建讨论
  # ----------------------------------------------------------
  /api/sessions:
    post:
      summary: "创建讨论会话"
      description: |
        创建一个新的圆桌讨论会话。服务端同步返回 Session 摘要，
        然后异步生成专家列表，状态变为 `generating`。
        客户端应通过 SSE 通道订阅 expert.generated / transcript.new 事件。
      operationId: createSession
      tags: [会话管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              topic: "人工智能是否会取代人类工作"
              expert_count: 4
      responses:
        "201":
          description: "创建成功，返回会话摘要（含专家字段为空列表，待 SSE 推送）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                topic: "人工智能是否会取代人类工作"
                expert_count: 4
                status: "generating"
                created_at: "2026-07-03T10:00:00Z"
                experts: []
        "400":
          description: "参数校验失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: "VALIDATION_ERROR"
                  message: "topic 长度须在 2-500 之间"

    get:
      summary: "获取会话列表"
      description: "按创建时间倒序返回会话列表，每页最多 20 条"
      operationId: listSessions
      tags: [会话管理]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: "页码（从 1 开始）"
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
          description: "每页条数"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SessionStatus"
          description: "按状态筛选"
      responses:
        "200":
          description: "会话列表"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionBrief"
                  total:
                    type: integer
                    example: 42
                  page:
                    type: integer
                    example: 1
                  size:
                    type: integer
                    example: 20
              example:
                data:
                  - id: "a1b2c3d4-..."
                    topic: "人工智能是否会取代人类工作"
                    expert_count: 4
                    status: "discussing"
                    created_at: "2026-07-03T10:00:00Z"
                  - id: "b2c3d4e5-..."
                    topic: "自动驾驶的安全责任归属"
                    expert_count: 3
                    status: "concluded"
                    created_at: "2026-07-03T09:30:00Z"
                total: 2
                page: 1
                size: 20
        "400":
          description: "参数校验失败"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ----------------------------------------------------------
  # GET /api/sessions/{id}/events —SSE 事件流
  # ----------------------------------------------------------
  /api/sessions/{sessionId}/events:
    get:
      summary: "订阅实时事件（SSE）"
      description: |
        通过 Server-Sent Events 订阅指定会话的实时推送。

        ## 事件类型

        | event 类型 | 说明 | 推送时机 |
        |------------|------|----------|
        | `session.status` | 会话状态变更 | 状态切换时 |
        | `expert.generated` | 专家生成完成 | 异步生成完专家后 |
        | `transcript.new` | 新发言 | 每次 AI 发言后 |
        | `conclusion.completed` | 结论生成完成 | 共识分歧生成后 |
        | `heartbeat` | 保活信号 | 每 30 秒 |
        | `session.error` | 错误 | 生成/讨论过程出错 |

        ## 连接规范
        - 客户端通过 `EventSource` 或 `fetch` 建立连接
        - 服务端以 `text/event-stream` 格式推送
        - 连接超时：5 分钟无数据传输自动断开
        - 客户端断线后应重连，事件 ID 支持断点续传（`Last-Event-ID`）
      operationId: subscribeSessionEvents
      tags: [实时推送]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会话 ID"
        - name: Last-Event-ID
          in: header
          schema:
            type: string
          description: |
            客户端断线重连时传入已收到的最后事件 ID，
            服务端从此 ID 之后重放事件。
      responses:
        "200":
          description: "SSE 事件流（text/event-stream）"
          headers:
            Content-Type:
              schema:
                type: string
                example: "text/event-stream"
            Cache-Control:
              schema:
                type: string
                example: "no-cache"
            Connection:
              schema:
                type: string
                example: "keep-alive"
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE 文本流，每事件包含 id / event / data 字段"
              example: |
                id: evt-001
                event: session.status
                data: {"session_id":"a1b2c3d4-...","status":"generating","previous_status":"pending"}

                id: evt-002
                event: expert.generated
                data: {"session_id":"a1b2c3d4-...","experts":[{"id":"e001-...","name":"张思远","title":"AI
伦理研究员","stance":"持审慎乐观态度","color":"#6366f1","avatar_emoji":"🧑‍🔬","sort_order":1}]}

                id: evt-003
                event: session.status
                data: {"session_id":"a1b2c3d4-...","status":"discussing","previous_status":"generating"}

                id: evt-004
                event: transcript.new
                data: {"id":"t001-...","session_id":"a1b2c3d4-...","speaker_type":"host","speaker_id":null,"speaker_name":"主持人","avatar_emoji":"🎙️","content":"各位专家好，今天我们讨论
主题是：人工智能是否会取代人类工作。","sequence":1,"created_at":"2026-07-03T10:00:05Z"}

                id: evt-005
                event: transcript.new
                data: {"id":"t002-...","session_id":"a1b2c3d4-...","speaker_type":"expert","speaker_id":"e001-...","speaker_name":"张思远","avatar_emoji":"🧑‍🔬","content":"我认AI
会重塑岗位结构，但不会完全取代人类。","sequence":2,"created_at":"2026-07-03T10:00:10Z"}

                id: evt-006
                event: heartbeat
                data: {"timestamp":"2026-07-03T10:00:35Z"}
        "404":
          description: "会话不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: "SESSION_NOT_FOUND"
                  message: "讨论会话不存在"

  # ----------------------------------------------------------
  # GET /api/sessions/{id}/transcript —完整记录
  # ----------------------------------------------------------
  /api/sessions/{sessionId}/transcript:
    get:
      summary: "获取完整发言记录"
      description: "按 sequence 升序返回指定会话的全部发言记录，含中止或已结束的会话"
      operationId: getTranscript
      tags: [查询]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会话 ID"
        - name: cursor
          in: query
          schema:
            type: string
          description: |
            分页游标：传入最后一条 transcript 的 sequence 值，
            返回此值之后的发言。不传则从头开始。
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
          description: "每页条数"
      responses:
        "200":
          description: "发言记录列表（含会话元信息及专家列表）"
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/SessionBrief"
                  experts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expert"
                  transcripts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transcript"
                  next_cursor:
                    type: integer
                    nullable: true
                    description: "下一页游标值；null 表示已到最后"
                    example: 101
                  has_more:
                    type: boolean
                    example: true
              example:
                session:
                  id: "a1b2c3d4-..."
                  topic: "人工智能是否会取代人类工作"
                  expert_count: 4
                  status: "discussing"
                  created_at: "2026-07-03T10:00:00Z"
                experts:
                  - id: "e001-..."
                    name: "张思远"
                    title: "AI 伦理研究员"
                    stance: "持审慎乐观态度"
                    color: "#6366f1"
                    avatar_emoji: "🧑‍🔬"
                    sort_order: 1
                transcripts:
                  - id: "t001-..."
                    session_id: "a1b2c3d4-..."
                    speaker_type: "host"
                    speaker_id: null
                    speaker_name: "主持人"
                    avatar_emoji: "🎙️"
                    content: "各位专家好..."
                    sequence: 1
                    created_at: "2026-07-03T10:00:05Z"
                next_cursor: 101
                has_more: false
        "404":
          description: "会话不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ----------------------------------------------------------
  # POST /api/sessions/{id}/conclusion —生成结论摘要
  # ----------------------------------------------------------
  /api/sessions/{sessionId}/conclusion:
    post:
      summary: "生成共识与分歧摘要"
      description: |
        对指定讨论会话生成最终结论，包括共识要点和分歧要点。

        - 如果会话已有结论，直接返回既有结果（幂等）
        - 如果会话仍在讨论中，将其状态置为 `concluded`，再生成结论
        - 生成完成后 SSE 推送 `conclusion.completed` 事件
      operationId: generateConclusion
      tags: [结论管理]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会话 ID"
      responses:
        "200":
          description: "结论生成成功（同步返回）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConclusionResponse"
              example:
                consensus:
                  - id: "c001-..."
                    session_id: "a1b2c3d4-..."
                    summary: "AI 将深度改变工作方式，人类需持续学习以适应变革"
                    sort_order: 1
                    created_at: "2026-07-03T10:15:00Z"
                  - id: "c002-..."
                    session_id: "a1b2c3d4-..."
                    summary: "法律法规和伦理准则应同步跟进"
                    sort_order: 2
                    created_at: "2026-07-03T10:15:00Z"
                divergences:
                  - id: "d001-..."
                    session_id: "a1b2c3d4-..."
                    description: "AI 对白领 vs 蓝领岗位的影响程度与时间线存在分歧"
                    involved_experts: ["e001-...", "e003-..."]
                    side_a_expert: "e001-..."
                    side_b_expert: "e003-..."
                    sort_order: 1
                    created_at: "2026-07-03T10:15:00Z"
                session_status: "concluded"
        "400":
          description: "会话状态不允许生成结论（如 error 状态）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error:
                  code: "INVALID_STATUS"
                  message: "当前会话状态为 error，无法生成结论"
        "404":
          description: "会话不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ----------------------------------------------------------
  # GET /api/sessions/{id} —会话详情
  # ----------------------------------------------------------
  /api/sessions/{sessionId}:
    get:
      summary: "获取会话详情（含专家列表）"
      description: "获取指定会话的完整信息，包括已生成的专家列表"
      operationId: getSession
      tags: [会话管理]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会话 ID"
      responses:
        "200":
          description: "会话详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: "会话不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

# ============================================================================
# 标签
# ============================================================================
tags:
  - name: 会话管理
    description: "CRUD 操作"
  - name: 实时推送
    description: "SSE 实时事件流"
  - name: 查询
    description: "数据查询"
  - name: 结论管理
    description: "共识分歧